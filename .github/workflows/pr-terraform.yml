---
name: PR:Terraform

'on':
  pull_request:
    paths:
      # This workflow
      - '.github/workflows/pr-terraform.yml'
      # Terraform configuration
      - '**/*.tf'

permissions:
  contents: read  # used by actions/checkout

jobs:
  find:
    name: Find main.tf files
    runs-on: ubuntu-24.04
    outputs:
      dirs: ${{ steps.changed_modules.outputs.changed_modules }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find terraform modules
        id: find
        run: |
          DIRS=$( \
            find -name '*main.tf' -exec dirname {} \; \
            | jq -ncR '[inputs]' \
          )
          echo dirs=$DIRS >> $GITHUB_OUTPUT

      - name: Determine changed files
        id: changed_files
        run: |
          # find all files changed relative to main
          TARGET=${{ github.event.pull_request.base.ref || 'main' }}
          CHANGED_FILES=$(
            git diff --name-only $TARGET...HEAD \
            | jq -ncR '[inputs]' \
          )
          echo "all_changed_and_modified_files=$CHANGED_FILES" >> $GITHUB_OUTPUT

      - name: Cross-check to determine changed modules
        id: changed_modules
        run: |
          CHANGED_FILES='${{ steps.changed_files.outputs.all_changed_and_modified_files }}'
          DIRS='${{ steps.find.outputs.dirs }}'
          CHANGED_MODULES=()

          for dir in $(echo $DIRS | jq -r '.[]'); do
            for file in $(echo $CHANGED_FILES | jq -r '.[]'); do
              # check if dir is a prefix of file
              if [[ "./$file" == "$dir"* ]]; then
                CHANGED_MODULES+=("$dir")
                break
              fi
            done
          done

          CHANGED_MODULES=$(printf "%s\n" "${CHANGED_MODULES[@]}" | jq -ncR '[inputs]')
          echo "changed_modules=$CHANGED_MODULES" >> $GITHUB_OUTPUT


  format:
    name: Format
    runs-on: ubuntu-24.04
    needs: find
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJson(needs.find.outputs.dirs) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: "1.11.3"

      - name: Format Terraform
        run: |
          set -o pipefail -o errexit -o nounset

          DIFF=$(terraform fmt -diff -recursive ${{ matrix.dir }})
          if [ -n "$DIFF" ]; then
            echo "At least one Terraform file is not formatted correctly:"
            echo "$DIFF"
            exit 1
          else
            echo "All Terraform files are formatted correctly."
          fi

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    needs: find
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJson(needs.find.outputs.dirs) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: "1.11.3"

      - name: Setup TFLint
        # yamllint disable rule:line-length
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6
        # yamllint enable
        with:
          tflint_version: "v0.52.0"

      - name: Validate Terraform
        run: tflint --chdir ${{ matrix.dir }}

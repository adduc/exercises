<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello, World</title>
  <style>
    body {
      display: flex;
      height: 100vh;
      margin: 0;
      align-items: center;
      justify-content: center;
      background: #1e1e2e;
      font-family: sans-serif;
    }
    h1 {
      color: #cdd6f4;
      font-size: 3rem;
    }
    .panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    button {
      font-size: 1rem;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 4px;
      background: #89b4fa;
      color: #1e1e2e;
      cursor: pointer;
    }
    button:hover {
      background: #74a0f5;
    }
    #result {
      color: #a6adc8;
      font-family: monospace;
      white-space: pre-wrap;
      text-align: center;
      min-height: 4rem;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Hello, World</h1>
    <button id="ask">Ask the backend</button>
    <div id="result"></div>
  </div>
  <script>
    document.getElementById('ask').addEventListener('click', async () => {
      const result = document.getElementById('result');
      try {
        result.textContent = await window.go.main.App.SystemInfo();
      } catch (err) {
        result.textContent = 'Error: ' + err;
      }
    });
  </script>
</body>
</html>

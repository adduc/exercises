---
- name: Create golden image from Ubuntu 24.04 template
  hosts: localhost
  gather_facts: false
  vars:
    vcenter_auth: &vcenter_auth
      hostname: "{{ vcenter_hostname }}"
      username: "{{ vcenter_username }}"
      password: "{{ vcenter_password }}"
      validate_certs: "{{ vcenter_validate_certs }}"

  tasks:

    - name: Ensure VM folder exists
      vmware.vmware.folder:
        <<: *vcenter_auth
        datacenter: "{{ vcenter_datacenter }}"
        relative_path: "{{ templates_folder }}"
        folder_type: "vm"
        state: present

    - name: Delete VM (if exists)
      community.vmware.vmware_guest:
        <<: *vcenter_auth
        name: "{{ template_golden_name }}"
        folder: "{{ templates_folder_path }}"
        state: absent
        force: true

    - name: Clone VM from Ubuntu template
      community.vmware.vmware_guest:
        <<: *vcenter_auth
        datacenter: "{{ vcenter_datacenter }}"
        cluster: "{{ vcenter_cluster }}"
        datastore: "{{ vcenter_datastore }}"
        name: "{{ template_golden_name }}"
        folder: "{{ templates_folder_path }}"
        template: "{{ template_ubuntu_name }}"
        # networks:
        #   - name: "{{ new_vm_network }}"
        #     device_type: vmxnet3
        #     mac: "{{ new_vm_mac }}"
        vapp_properties:
          - id: "instance-id"
            value: "{{ template_golden_name }}"
          - id: hostname
            value: "{{ template_golden_name }}"
          - id: "user-data"
            value: "{{ template_golden_userdata | b64encode }}"
        state: poweredon

    - name: Wait for cloud-init to finish and shut down
      community.vmware.vmware_guest_info:
        <<: *vcenter_auth
        name: "{{ template_golden_name }}"
      register: vm_info
      until: vm_info.instance.hw_power_status == 'poweredOff'
      retries: 60
      delay: 30

    - name: Clear vApp properties
      community.vmware.vmware_guest:
        <<: *vcenter_auth
        name: "{{ template_golden_name }}"
        vapp_properties:
          - id: instance-id
            value: ""
          - id: hostname
            value: ""
          - id: user-data
            value: ""

    - name: Convert to template
      community.vmware.vmware_guest:
        <<: *vcenter_auth
        name: "{{ template_golden_name }}"
        is_template: true

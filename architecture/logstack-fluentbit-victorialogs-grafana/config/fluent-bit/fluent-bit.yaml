
pipeline:
  inputs:
    # tail /log/*.log
    - name: tail
      path: /log/*.log
      db: /data/flutent-bit.db

  outputs:
    - name: http
      match: "*"
      host: victorialogs
      port: 9428
      uri: /insert/jsonline?_stream_fields=stream&_msg_field=log&_time_field=date
      format: json_lines
      json_date_format: iso8601

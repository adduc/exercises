---
- name: Create golden image from Alpine 3.23 template
  hosts: localhost
  gather_facts: false
  vars:
    vcenter_auth: &vcenter_auth
      hostname: "{{ vcenter_hostname }}"
      username: "{{ vcenter_username }}"
      password: "{{ vcenter_password }}"
      validate_certs: "{{ vcenter_validate_certs }}"

  tasks:

    - name: Ensure VM folder exists
      vmware.vmware.folder:
        <<: *vcenter_auth
        datacenter: "{{ vcenter_datacenter }}"
        relative_path: "{{ templates_folder }}"
        folder_type: "vm"
        state: present

    - name: Delete VM (if exists)
      community.vmware.vmware_guest:
        <<: *vcenter_auth
        name: "{{ template_golden_name }}"
        folder: "{{ templates_folder_path }}"
        state: absent
        force: true

    - name: Create cloud-init meta-data
      ansible.builtin.copy:
        content: |
          instance-id: {{ template_golden_name }}
          local-hostname: {{ template_golden_name }}
        dest: "{{ template_golden_metadata_local }}"
        mode: '0644'

    - name: Create cloud-init user-data
      ansible.builtin.copy:
        content: "{{ template_golden_userdata }}"
        dest: "{{ template_golden_userdata_local }}"
        mode: '0644'

    - name: Create cloud-init seed ISO (cidata)
      ansible.builtin.command:
        cmd: >
          genisoimage
          -output {{ template_golden_cidata_iso_local }}
          -volid cidata
          -joliet -rock
          {{ template_golden_metadata_local }}
          {{ template_golden_userdata_local }}
      register: iso_result
      changed_when: iso_result.rc == 0
      failed_when: iso_result.rc != 0

    - name: Upload cloud-init ISO to datastore
      community.vmware.vsphere_copy:
        <<: *vcenter_auth
        datacenter: "{{ vcenter_datacenter }}"
        datastore: "{{ vcenter_datastore }}"
        src: "{{ template_golden_cidata_iso_local }}"
        path: "{{ template_golden_cidata_iso_datastore_path }}"

    - name: Clone VM from Alpine template
      community.vmware.vmware_guest:
        <<: *vcenter_auth
        datacenter: "{{ vcenter_datacenter }}"
        cluster: "{{ vcenter_cluster }}"
        datastore: "{{ vcenter_datastore }}"
        name: "{{ template_golden_name }}"
        folder: "{{ templates_folder_path }}"
        template: "{{ template_os_name }}"
        state: present

    - name: Attach cloud-init ISO as CD-ROM
      community.vmware.vmware_guest:
        <<: *vcenter_auth
        datacenter: "{{ vcenter_datacenter }}"
        name: "{{ template_golden_name }}"
        folder: "{{ templates_folder_path }}"
        cdrom:
          - controller_type: sata
            controller_number: 0
            unit_number: 0
            type: iso
            iso_path: "[{{ vcenter_datastore }}] {{ template_golden_cidata_iso_datastore_path }}"
            state: present

    - name: Power on VM
      community.vmware.vmware_guest:
        <<: *vcenter_auth
        datacenter: "{{ vcenter_datacenter }}"
        name: "{{ template_golden_name }}"
        folder: "{{ templates_folder_path }}"
        state: poweredon

    - name: Wait for cloud-init to finish and shut down
      community.vmware.vmware_guest_info:
        <<: *vcenter_auth
        datacenter: "{{ vcenter_datacenter }}"
        name: "{{ template_golden_name }}"
      register: vm_info
      until: vm_info.instance.hw_power_status == 'poweredOff'
      retries: 120
      delay: 10

    - name: Remove cloud-init ISO from VM
      community.vmware.vmware_guest:
        <<: *vcenter_auth
        datacenter: "{{ vcenter_datacenter }}"
        name: "{{ template_golden_name }}"
        folder: "{{ templates_folder_path }}"
        cdrom:
          - controller_type: sata
            controller_number: 0
            unit_number: 0
            state: absent

    - name: Delete cloud-init ISO from datastore
      community.vmware.vsphere_file:
        <<: *vcenter_auth
        datacenter: "{{ vcenter_datacenter }}"
        datastore: "{{ vcenter_datastore }}"
        path: "{{ template_golden_cidata_iso_datastore_path }}"
        state: absent

    - name: Convert VM to template
      community.vmware.vmware_guest:
        <<: *vcenter_auth
        datacenter: "{{ vcenter_datacenter }}"
        name: "{{ template_golden_name }}"
        folder: "{{ templates_folder_path }}"
        is_template: true
        state: present
